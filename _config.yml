# Site Settings
title                    : "Changhai Zhou"
description              : "Changhai Zhou | Efficient LLMs, Compression, and Adaptive Inference"
repository               : "manlenzzz/manlenzzz.github.io"
url                      : "https://manlenzzz.github.io"
baseurl                  : ""
google_scholar_stats_use_cdn : False

google_analytics_id      :

google_site_verification :
bing_site_verification   :
baidu_site_verification  :

author:
  name             : "Changhai Zhou"
  avatar           : "images/me.png"
  bio              : "PhD Candidate at Fudan University | Efficient LLMs, Compression, and PEFT"
  location         : "Shanghai, China"
  employer         :
  pubmed           :
  googlescholar    : "https://scholar.google.com/citations?user=mM3rnV4AAAAJ&hl=zh-CN"
  email            : "zhouch23@m.fudan.edu.cn"
  researchgate     :
  uri              :
  bitbucket        :
  codepen          :
  dribbble         :
  flickr           :
  facebook         :
  foursquare       :
  github           : "manlenzzz"
  google_plus      :
  keybase          :
  instagram        :
  impactstory      :
  lastfm           :
  linkedin         :
  dblp             :
  orcid            :
  pinterest        :
  soundcloud       :
  stackoverflow    :
  steam            :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  xing             :
  youtube          :
  wikipedia        :

include:
  - .htaccess
  - _pages
  - files
exclude:
  - _site
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - vendor
  - node_modules
  - docs
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      author_profile: true

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Asia/Shanghai

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji

compress_html:
  clippings: all
  ignore:
    envs: development
